version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: muchtodo-backend:latest
    container_name: muchtodo-backend
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://mongouser:mongopass@mongodb:27017/muchtodo?authSource=admin
      DB_NAME: muchtodo
      PORT: "8080"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - muchtodo-net

  mongodb:
    image: mongo:7.0
    container_name: muchtodo-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongouser
      MONGO_INITDB_ROOT_PASSWORD: mongopass
      MONGO_INITDB_DATABASE: muchtodo
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - muchtodo-net

networks:
  muchtodo-net:
    driver: bridge

volumes:
  mongodb-data:
    driver: local
