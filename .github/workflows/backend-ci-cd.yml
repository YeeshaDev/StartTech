name: Backend CI/CD

on:
  push:
    branches: [main, feature/full-stack]
    paths: ['Server/**']
  pull_request:
    branches: [main]
    paths: ['Server/**']

jobs:
  # ─────────────────────────────────────────────────────────
  # Test (runs on every push / PR)
  # ─────────────────────────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Server/MuchToDo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go 1.25
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Download modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      # -short skips integration tests that require a running Docker daemon
      # (those tests use testcontainers for MongoDB and Redis).
      # Full integration tests can be run locally with: go test -v ./...
      - name: Unit tests
        run: go test -v -short -coverprofile=coverage.out ./...

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: Server/MuchToDo/coverage.out
          retention-days: 7

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      # continue-on-error: true because govulncheck may surface vulnerabilities
      # in indirect dependencies that are not directly exploitable; review
      # the output and triage manually.
      - name: Vulnerability scan
        run: govulncheck ./...
        continue-on-error: true

  # ─────────────────────────────────────────────────────────
  # Build Docker image & push to ECR (push to main only)
  # ─────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: Server/MuchToDo

    outputs:
      image: ${{ steps.set-image.outputs.image }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          LATEST_TAG=latest
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "LATEST_TAG=$LATEST_TAG" >> "$GITHUB_ENV"
          echo "REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          docker build \
            -t "$REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG" \
            -t "$REGISTRY/${{ secrets.ECR_REPOSITORY }}:$LATEST_TAG" \
            .

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          format: table
          exit-code: '0'     # report but do not fail the pipeline
          severity: CRITICAL,HIGH

      - name: Push image(s) to ECR
        run: |
          docker push "$REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG"
          docker push "$REGISTRY/${{ secrets.ECR_REPOSITORY }}:$LATEST_TAG"

      - name: Set output image
        id: set-image
        run: |
          echo "image=$REGISTRY/${{ secrets.ECR_REPOSITORY }}:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────
  # Deploy via SSM Run Command to EC2 ASG (push to main only)
  # ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2 ASG
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set image tag
        run: |
          echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Resolve ECR registry URL
        run: |
          REGISTRY=$(aws ecr describe-registry --query 'registryId' --output text).dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          echo "ECR_REGISTRY=$REGISTRY" >> "$GITHUB_ENV"

      - name: Deploy containers via SSM Run Command
        id: ssm-deploy
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --targets "Key=tag:aws:autoscaling:groupName,Values=${{ secrets.ASG_NAME }}" \
            --parameters 'commands=[
              "#!/bin/bash",
              "set -euo pipefail",
              "AWS_REGION=${{ secrets.AWS_REGION }}",
              "ECR_REGISTRY=${{ env.ECR_REGISTRY }}",
              "ECR_REPO=${{ secrets.ECR_REPOSITORY }}",
              "IMAGE_TAG=${{ env.IMAGE_TAG }}",
              "aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY",
              "docker pull $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG",
              "docker stop muchtodo-backend 2>/dev/null || true",
              "docker rm   muchtodo-backend 2>/dev/null || true",
              "docker run -d --name muchtodo-backend --restart unless-stopped -p 8080:8080 --env-file /etc/muchtodo.env $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG",
              "docker image prune -f"
            ]' \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM_COMMAND_ID=$COMMAND_ID" >> "$GITHUB_ENV"
          echo "SSM command sent: $COMMAND_ID"

      - name: Wait for SSM command to complete
        run: |
          echo "Waiting for SSM command $SSM_COMMAND_ID to finish..."
          for i in $(seq 1 30); do
            STATUS=$(aws ssm list-command-invocations \
              --command-id "$SSM_COMMAND_ID" \
              --details \
              --query 'CommandInvocations[*].Status' \
              --output text 2>/dev/null || echo "Pending")

            echo "Attempt $i — Status: $STATUS"

            if echo "$STATUS" | grep -qiE "^(Success|Failed|Cancelled|TimedOut)$"; then
              if echo "$STATUS" | grep -qiE "^Success$"; then
                echo "SSM command succeeded."
                break
              else
                echo "SSM command finished with status: $STATUS"
                exit 1
              fi
            fi

            sleep 10
          done

      - name: Smoke test — health endpoint
        run: |
          ALB_DNS="${{ secrets.ALB_DNS_NAME }}"
          echo "Checking https://$ALB_DNS/health ..."
          for i in 1 2 3 4 5; do
            if curl -sf "http://$ALB_DNS/health"; then
              echo ""
              echo "Health check passed on attempt $i."
              exit 0
            fi
            echo "Attempt $i failed — retrying in 15 s..."
            sleep 15
          done
          echo "Health check failed after 5 attempts."
          exit 1

      - name: Deployment success notice
        run: |
          echo "──────────────────────────────────────────────"
          echo "  Backend deployment complete!"
          echo "  Image    : ${{ env.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"
          echo "  Endpoint : http://${{ secrets.ALB_DNS_NAME }}"
          echo "──────────────────────────────────────────────"
