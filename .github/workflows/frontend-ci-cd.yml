name: Frontend CI/CD

on:
  push:
    branches: [master, main, feature/full-stack]
    paths: ['Client/**']
  pull_request:
    branches: [master, main]
    paths: ['Client/**']

jobs:
  # ─────────────────────────────────────────────────────────
  # Build & lint (runs on every push / PR)
  # ─────────────────────────────────────────────────────────
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Client

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for git-based versioning

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Security audit (production deps only)
        # --omit=dev restricts the audit to production dependencies only
        run: npm audit --audit-level=high --omit=dev

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: Client/dist
          retention-days: 1

  # ─────────────────────────────────────────────────────────
  # Deploy to S3 + CloudFront (push to main only)
  # ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: build
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Sync static assets to S3 (long-lived cache)
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "max-age=31536000" \
            --exclude "*.html"

      - name: Sync HTML files to S3 (no-cache)
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "no-cache" \
            --include "*.html" \
            --exclude "*" \
            --metadata-directive REPLACE

      - name: Invalidate CloudFront distribution
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "──────────────────────────────────────────"
          echo "  Deployment complete!"
          echo "  S3 Bucket  : ${{ secrets.S3_BUCKET_NAME }}"
          echo "  CloudFront : https://${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}.cloudfront.net"
          echo "──────────────────────────────────────────"
